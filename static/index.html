<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobPilot — Atharva's Job Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
                        <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
                        <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
                        <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
                    </svg>
                </div>
                <h2>JobPilot</h2>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-btn active" id="nav-jobs">Jobs List</button>
                <button class="nav-btn" id="nav-companies">Companies</button>
                <button class="nav-btn" id="nav-applied">Applied <span id="applied-count" class="applied-counter">0</span></button>
            </nav>

            <div class="actions-area">
                <button id="btn-scan" class="action-btn scan-btn">Scan All Companies</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="page-title">Matched Jobs</h1>
                <div class="header-status">
                    <span id="scan-status" class="status-badge idle">Idle</span>
                </div>
            </header>

            <!-- Jobs View -->
            <section id="view-jobs" class="view-section active">
                <div class="jobs-grid" id="jobs-container">
                    <div class="empty-state" id="jobs-empty-state">
                        <p>No jobs found. Add companies and run a scan!</p>
                    </div>
                </div>
            </section>

            <!-- Companies View -->
            <section id="view-companies" class="view-section">
                <div class="add-company-card panel">
                    <h3>Add New Company to Track</h3>
                    <form id="add-company-form" class="form-row">
                        <input type="text" id="company-name" placeholder="Company Name (e.g., Google)" required>
                        <input type="url" id="company-url" placeholder="Career Page URL" required>
                        <button type="submit" class="action-btn">Add Company</button>
                    </form>
                </div>

                <div class="companies-list panel">
                    <h3>Tracked Companies</h3>
                    <div class="table-container">
                        <table id="companies-table">
                            <thead>
                                <tr>
                                    <th>Company</th>
                                    <th>Career URL</th>
                                    <th>Scan Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="companies-tbody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Applied View -->
            <section id="view-applied" class="view-section">
                <div class="panel">
                    <div class="applied-header">
                        <h3>Applied Jobs</h3>
                        <span class="applied-total" id="applied-total">Total: 0</span>
                    </div>
                    <div id="applied-container" class="applied-list">
                        <div class="empty-state" id="applied-empty-state">
                            <p>No applications yet. Click "Apply" on a job to track it!</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Apply Confirmation Modal -->
    <div id="apply-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>Did you apply?</h3>
            <p id="modal-job-info"></p>
            <div class="modal-actions">
                <button id="modal-yes" class="action-btn">✅ Yes, I Applied!</button>
                <button id="modal-no" class="action-btn modal-cancel">❌ Not Yet</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Message</div>

    <script src="/static/script.js"></script>
</body>
</html>
